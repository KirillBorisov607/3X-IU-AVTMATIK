# ================================================================
# 3x-ui Subscription Aggregator — Config
# ================================================================

# Secret token — put this in your subscription URL:
#   http://YOUR_AGG_SERVER:8080/sub/YOUR_TOKEN_HERE
#
# Generate a strong token: openssl rand -hex 32
token: "CHANGE_ME_GENERATE_WITH_openssl_rand_hex_32"

# Aggregator listen address
host: "0.0.0.0"
port: 8080

# Cache duration in seconds (300 = 5 min)
# Clients won't hammer your servers — aggregator caches results
cache_ttl: 300

# ----------------------------------------------------------------
# Servers — add one entry per 3x-ui instance
#
# How to get sub_url:
#   1. Open your 3x-ui panel
#   2. Go to "Subscription" tab in the client settings
#   3. Copy the subscription link
#   It looks like: http://IP:PORT/PANEL_PATH/sub/CLIENT_UUID
#
# prefix  — added before each proxy name so you know which server
# verify_ssl — set to false if using self-signed cert on the panel
# timeout — seconds to wait for each server
# ----------------------------------------------------------------
servers:
  - name: "Server-1 (US)"
    sub_url: "http://1.2.3.4:2053/abcdef01/sub/your-client-uuid"
    prefix: "US"
    verify_ssl: false
    timeout: 10

  - name: "Server-2 (DE)"
    sub_url: "http://5.6.7.8:2053/abcdef02/sub/your-client-uuid"
    prefix: "DE"
    verify_ssl: false
    timeout: 10

  # - name: "Server-3 (NL)"
  #   sub_url: "http://9.10.11.12:2053/abcdef03/sub/your-client-uuid"
  #   prefix: "NL"
  #   verify_ssl: false
  #   timeout: 10
